<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="/css/common/base.css">
	<link rel="stylesheet" href="/css/common/layout.css">
	<link rel="stylesheet" href="/css/common/footer.css">
	<link rel="stylesheet" href="/css/common/header.css">
	<style>

		    h1 {
		      font-size: 28px;
		      margin-bottom: 24px;
		      color: #e28aaa;
		      text-align: center;
		    }

		    h2 {
		      font-size: 20px;
		      margin-top: 32px;
		      margin-bottom: 12px;
		      color: #e28aaa;
		      border-left: 6px solid #f3b5c8;
		      padding-left: 10px;
		    }
		  </style>
	<title>メール認証完了 | Hoime</title>

</head>

<body>
	<header>
		<div class="header-inner">
			<img src="/img/hoimemo-icon.png" alt="Hoime" class="logo">
		</div>
	</header>

	<div class="container">

		<div class="card">
			<h1 class="app-title">Hoime</h1>
			<h2>メール認証が完了しました</h2>

			<p class="message">
				Hoime へのご登録ありがとうございます。<br>
				メールアドレスの認証が正常に完了しました。
			</p>

			<p class="sub-message">
				さっそくログインして、Hoime をご利用ください。
			</p>

			<div class="links">
				<a href="/login" class="btn-primary">ログインへ進む</a>
			</div>

		</div>

	</div>
	<footer>
		<div class="footer-inner">
			<img src="/img/hoimemo-icon.png" alt="Hoime" class="logo">
		</div>
	</footer>

</body>

</html>
