<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新規登録</title>
  <link rel="stylesheet" href="/css/app/HM0002.css">
  <link rel="stylesheet" href="/css/common/base.css">
  <link rel="stylesheet" href="/css/common/header.css">
  <link rel="stylesheet" href="/css/common/footer.css">
  <link rel="stylesheet" href="/css/common/layout.css">

</head>

<body>
<header>
  <div class="header-inner">
    <img src="/img/hoimemo-icon.png" class="logo">
  </div>
</header>

  <div class="input-form">
    <h1 class="app-title">Hoime</h1>
    <h2>新規登録</h2>
    <p th:if="${error}" th:text="${error}" style="color:#d9534f; margin-bottom:12px;"></p>

    <form method="post" action="/signup">
      <div>
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div>
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div>
        <label for="confirm-password">パスワード（確認）</label>
        <input type="password" id="confirm-password" name="confirm-password" required>
      </div>

      <div>
        <label for="nickname">ニックネーム</label>
        <input type="text" id="nickname" name="nickname" required>
      </div>

	  <div class="checkbox">
		<label class="checkbox">
		<input type="checkbox" id="agree" name="agree" required disabled>
		  <span>
		    <a href="/terms">利用規約</a> に同意します
		  </span>
		</label>

	  </div>

      <button type="submit">登録する</button>
    </form>

    <div class="links">
      <a href="/login">ログイン画面に戻る</a>
    </div>
  </div>
	<footer>
	<div class="footer-inner">
	  <img src="/img/hoimemo-icon.png" class="logo">
	</div>
	  © 2026 Hoime<br>
	  利用規約 ｜ プライバシーポリシー
	</footer>
</body>
<script>
  if (localStorage.getItem("terms_opened") === "true") {
    document.getElementById("agree").disabled = false;
  }
</script>



</html>
