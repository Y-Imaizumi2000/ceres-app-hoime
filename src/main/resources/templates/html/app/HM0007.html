<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>書類一覧</title>
    <link rel="stylesheet" href="/css/common/base.css" />
    <link rel="stylesheet" href="/css/common/header.css" />
    <link rel="stylesheet" href="/css/common/footer.css" />
    <link rel="stylesheet" href="/css/common/layout.css" />
    <style>
        .doc-list {
            max-width: 1080px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .doc-item {
            background: #fff;
            border: 1px solid #f5d6ff;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(226,138,170,0.08);
        }
        .doc-item h3 {
            margin: 0 0 4px;
            color: #6d4a62;
        }
        .doc-item p {
            margin: 0;
            color: #7f5a7a;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <img src="/img/hoimemo-icon.png" class="logo" alt="Hoimeアイコン" />
        <div class="header-title">Hoime</div>
        <div class="header-user" th:text="${nickname != null} ? 'ようこそ ' + ${nickname} + 'さん' : 'ようこそ ゲストさん'">ようこそ ゲストさん</div>
    </div>
    <div class="header-menu">
        <a href="/dashboard">ホーム</a>
        <a href="/document/create">書類一覧</a>
        <a href="/templates">テンプレ</a>
        <a href="/contact">お問い合わせ</a>
        <a href="/settings">設定</a>
    </div>
</header>

<main class="doc-list">
    <h1>書類一覧</h1>
    <div class="doc-item">
        <h3>デフォルトドキュメントA</h3>
        <p>連絡帳、園だより、週案などのサンプル書類をここで一覧できます。</p>
    </div>
    <div class="doc-item">
        <h3>ドキュメントB</h3>
        <p>まだ文書がありません。新規作成ボタンから作成してください。</p>
    </div>
</main>

<footer class="footer">
    <div class="footer-inner">
        <img src="/img/hoimemo-icon.png" class="logo" alt="Hoimeアイコン" />
        <div class="footer-links">
            <a href="/terms">利用規約</a>
            <a href="/privacy">プライバシーポリシー</a>
            <a href="/law">特商法</a>
        </div>
        <div class="footer-copy">© 2026 Hoime</div>
    </div>
</footer>
</body>
</html>
