

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新規登録</title>
  <link rel="stylesheet" href="/css/app/HM0001.css">
  <link rel="stylesheet" href="/css/common/base.css">
  <link rel="stylesheet" href="/css/common/header.css">
  <link rel="stylesheet" href="/css/common/footer.css">
  <link rel="stylesheet" href="/css/common/layout.css">

</head>

<body>
<header>
    <div class="header-inner">
        <img src="/img/hoimemo-icon.png" class="logo" alt="Hoimeアイコン" />
        <div class="header-title">Hoime</div>
        <div class="header-user" th:text="${nickname != null} ? 'ようこそ ' + ${nickname} + 'さん' : 'ようこそ ゲストさん'">ようこそ ゲストさん</div>
    </div>
</header>


  <div class="input-form">
  	<h1 class="app-title">Hoime</h1>

      <h2>ログイン</h2>
      <p th:if="${param.error}" th:text="ログインに失敗しました。メールアドレスまたはパスワードを確認してください。" style="color:#d9534f; margin-bottom:12px;"></p>

      <form method="post" action="/login">
          <div>
              <label for="username">メールアドレス</label>
              <input type="text" id="username" name="username" required>
          </div>

          <div>
              <label for="password">パスワード</label>
              <input type="password" id="password" name="password" required>
          </div>

          <button type="submit">ログイン</button>
      </form>

      <div class="links">
          <a href="/signup">新規登録</a>
  		<a href="/reset-password">パスワードを忘れた場合</a>
      </div>
  </div>

  <footer class="footer">
      <div class="footer-inner">
  	<img src="/img/hoimemo-icon.png" class="logo">

          <div class="footer-links">
              <a href="/terms">利用規約</a>
              <a href="/privacy">プライバシーポリシー</a>
              <a href="/law">特定商取引法に基づく表記</a>
          </div>

          <div class="footer-copy">
              © 2026 Hoime
          </div>

      </div>
  </footer>

</body>
</html>
