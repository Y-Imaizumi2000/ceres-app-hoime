<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>書類作成画面（共通）</title>
    <link rel="stylesheet" href="/css/common/base.css" />
    <link rel="stylesheet" href="/css/common/header.css" />
    <link rel="stylesheet" href="/css/common/footer.css" />
    <link rel="stylesheet" href="/css/common/layout.css" />
</head>
<body>
<header>
    <div class="header-inner">
        <img src="/img/hoimemo-icon.png" class="logo" alt="Hoimeアイコン" />
        <div class="header-title">Hoime</div>
        <div class="header-user" th:text="${nickname != null} ? 'ようこそ ' + ${nickname} + 'さん' : 'ようこそ ゲストさん'">ようこそ ゲストさん</div>
    </div>

    <div class="header-menu">
        <a href="/dashboard">ホーム</a>
        <a href="/document/create">書類一覧</a>
        <a href="/templates">テンプレ</a>
        <a href="/contact">お問い合わせ</a>
        <a href="/settings">設定</a>
    </div>
</header>

<main class="content" style="padding: 24px;">
    <section class="card" style="max-width: 900px; margin: 0 auto;">
        <h1 style="margin-top:0;">書類作成画面（共通）</h1>
        <p>この画面は各種書類作成ページの共通ベースです。ここからテンプレートを選び、書類内容を入力して生成できます。</p>

        <div style="display:grid; gap:12px; margin-top:16px;">
            <a class="btn" href="/templates/contact-sheet" style="text-decoration:none; padding:10px 14px; background:#ff7fa8; color:#fff; border-radius:999px;">連絡帳テンプレで作成</a>
            <a class="btn" href="/templates/newsletter" style="text-decoration:none; padding:10px 14px; background:#ff7fa8; color:#fff; border-radius:999px;">園だよりテンプレで作成</a>
            <a class="btn" href="/templates/event" style="text-decoration:none; padding:10px 14px; background:#ff7fa8; color:#fff; border-radius:999px;">イベント案内テンプレで作成</a>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="footer-inner">
        <img src="/img/hoimemo-icon.png" class="logo" alt="Hoimeアイコン" />
        <div class="footer-links">
            <a href="/terms">利用規約</a>
            <a href="/privacy">プライバシーポリシー</a>
            <a href="/law">特商法</a>
        </div>
        <div class="footer-copy">© 2026 Hoime</div>
    </div>
</footer>
</body>
</html>
