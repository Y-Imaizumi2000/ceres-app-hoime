<head>
<link rel="stylesheet" href="/css/common/base.css">
<link rel="stylesheet" href="/css/common/header.css">
<link rel="stylesheet" href="/css/common/footer.css">
<link rel="stylesheet" href="/css/common/layout.css">
	<style>
	    body {
	      font-family: "Noto Sans JP", sans-serif;
	      background: #fff6fa;
	      color: #444;
	      line-height: 1.8;
	      padding: 40px 20px;
	    }

	    h1 {
	      font-size: 28px;
	      margin-bottom: 24px;
	      color: #e28aaa;
	      text-align: center;
	    }

	    h2 {
	      font-size: 20px;
	      margin-top: 32px;
	      margin-bottom: 12px;
	      color: #e28aaa;
	      border-left: 6px solid #f3b5c8;
	      padding-left: 10px;
	    }

	    p {
	      margin-bottom: 16px;
	    }
		
		.back-button {
		  text-align: right;
		  margin-top: 30px;
		}

		.back-button button {
		  background: #f3b5c8;
		  color: white;
		  border: none;
		  padding: 10px 24px;
		  border-radius: 24px;
		  font-size: 16px;
		  cursor: pointer;
		  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
		  transition: 0.2s;
		}

		.back-button button:hover {
		  opacity: 0.85;
		}


	    footer {
	      margin-top: 40px;
	      text-align: center;
	      font-size: 14px;
	      color: #999;
	    }
	  </style>
</head>
<header>
    <div class="header-inner">
	<img src="/img/hoimemo-icon.png" alt="Hoime" class="logo">
    </div>
</header>

<div class="input-form">

    <h2>メールを送信しました</h2>

    <p class="text">
        ご登録ありがとうございます。<br>
        <span th:if="${registeredNickname}" th:text="${registeredNickname} + ' さん'" style="font-weight:bold;"></span><br th:if="${registeredNickname}">
        ご入力いただいたメールアドレス宛に、認証用リンクをお送りしました。<br>
        <span th:if="${registeredEmail}" th:text="${registeredEmail}" style="font-weight:bold;"></span><br th:if="${registeredEmail}">
        メール内のリンクをクリックして、アカウントを有効化してください。
    </p>

    <div class="section">
        <p class="text">メールが届かない場合：</p>
        <ul class="text">
            <li>迷惑メールフォルダをご確認ください</li>
            <li>メールアドレスの入力間違いがないかご確認ください</li>
            <li>数分待っても届かない場合は、再送信をお試しください</li>
        </ul>
    </div>

    <button onclick="location.href='/auth/resend'">
        認証メールを再送信する
    </button>

    <div class="links">
        <a href="/login">ログイン画面へ戻る</a>
    </div>

</div>

<footer class="footer">
    <div class="footer-inner">
	<img src="/img/hoimemo-icon.png" class="logo">

        <div class="footer-links">
            <a href="/terms">利用規約</a>
            <a href="/privacy">プライバシーポリシー</a>
            <a href="/law">特定商取引法に基づく表記</a>
        </div>

        <div class="footer-copy">
            © 2026 Hoime
        </div>

    </div>
</footer>
